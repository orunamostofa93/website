<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>অভিভাবক পোর্টাল</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans Bengali',sans-serif;background:#f4f6f8;color:#1a2e22;min-height:100vh;}
:root{--primary:#2d7a4f;--primary-dark:#1a4a2e;--accent:#c9a227;--danger:#c0392b;--border:#dde3e7;--card:#fff;}
.topbar{background:linear-gradient(135deg,#1a4a2e,#2d7a4f);color:#fff;padding:14px 20px;text-align:center;}
.topbar h1{font-size:18px;font-weight:800;}
.topbar p{font-size:12px;opacity:.8;margin-top:2px;}
.container{max-width:800px;margin:0 auto;padding:20px 16px;}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:20px;margin-bottom:16px;}
.card-title{font-size:15px;font-weight:700;color:var(--primary-dark);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
input,select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;outline:none;transition:.2s;}
input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(45,122,79,.1);}
.btn{padding:10px 20px;border:none;border-radius:8px;font-family:inherit;font-size:14px;cursor:pointer;font-weight:700;transition:.2s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-accent{background:var(--accent);color:#1a2e22;}
.btn-danger{background:var(--danger);color:#fff;}
.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:700;}
.badge-green{background:#d4edda;color:#155724;}
.badge-red{background:#fde8e8;color:#721c24;}
.badge-yellow{background:#fff3cd;color:#856404;}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.stat-box{background:var(--primary-dark);color:#fff;border-radius:10px;padding:14px;text-align:center;}
.stat-box .n{font-size:22px;font-weight:800;}
.stat-box .l{font-size:11px;opacity:.8;margin-top:2px;}
.stat-box.accent{background:var(--accent);color:#1a2e22;}
.stat-box.danger{background:var(--danger);}
.chart-bar{height:8px;border-radius:4px;background:#e0e0e0;margin:4px 0;}
.chart-bar-fill{height:100%;border-radius:4px;background:var(--primary);transition:width .5s;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--primary-dark);color:#fff;padding:8px;text-align:left;}
td{padding:8px;border-bottom:1px solid var(--border);}
tr:hover td{background:#f8fffe;}
.payment-form{background:#f0f7f0;border:1.5px solid #c0ddc0;border-radius:10px;padding:16px;}
.payment-method{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.method-btn{flex:1;min-width:100px;padding:10px;border:2px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;text-align:center;font-family:inherit;font-size:13px;transition:.2s;}
.method-btn.active{border-color:var(--primary);background:var(--primary);color:#fff;}
.pending-box{background:#fff3cd;border:1.5px solid #ffc107;border-radius:8px;padding:12px;text-align:center;}
.confirmed-box{background:#d4edda;border:1.5px solid #28a745;border-radius:8px;padding:12px;text-align:center;}
.search-area{display:flex;gap:10px;}
.search-area input{flex:1;}
#loader{text-align:center;padding:30px;color:var(--primary);font-size:16px;}
.tab-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;border-bottom:2px solid var(--border);padding-bottom:10px;}
.tab{padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;background:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.result-exam{background:var(--primary-dark);color:#fff;padding:8px 12px;border-radius:6px 6px 0 0;font-size:13px;font-weight:700;display:flex;justify-content:space-between;}
.result-table-wrap{border:1px solid #ddd;border-radius:0 0 6px 6px;margin-bottom:12px;overflow:hidden;}
@media(max-width:480px){.stat-grid{grid-template-columns:1fr 1fr;}.search-area{flex-direction:column;}}
</style>
</head>
<body>

<div class="topbar">
  <h1>🕌 <span id="instNameTop">মাদ্রাসা</span></h1>
  <p id="instSubTop">অভিভাবক পোর্টাল</p>
</div>

<div class="container">
  <!-- Search -->
  <div class="card" id="searchCard">
    <div class="card-title">🔍 শিক্ষার্থী খুঁজুন</div>
    <div class="search-area">
      <input id="searchInput" type="text" placeholder="ইউনিক কোড লিখুন (যেমন: AN-01-001)" autocomplete="off">
      <button class="btn btn-primary" onclick="searchStudent()">খুঁজুন</button>
    </div>
    <div id="searchError" style="color:var(--danger);font-size:13px;margin-top:8px;display:none;"></div>
    <p style="font-size:12px;color:#888;margin-top:8px;">আইডি কার্ডের কোডটি এখানে লিখুন অথবা QR কোড স্ক্যান করুন।</p>
  </div>

  <!-- Loader -->
  <div id="loader" style="display:none;">⏳ তথ্য লোড হচ্ছে...</div>

  <!-- Student Profile -->
  <div id="studentProfile" style="display:none;">

    <!-- Student Banner -->
    <div class="card" style="background:linear-gradient(135deg,#1a4a2e,#2d7a4f);color:#fff;">
      <div style="display:flex;align-items:center;gap:16px;">
        <div id="sPhotoArea" style="width:64px;height:74px;border-radius:8px;border:2px solid var(--accent);overflow:hidden;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;"></div>
        <div>
          <div style="font-size:19px;font-weight:800;" id="pName">-</div>
          <div style="font-size:12px;opacity:.8;" id="pClass">-</div>
          <div style="font-size:11px;opacity:.7;font-family:monospace;margin-top:2px;" id="pCode">-</div>
        </div>
        <div style="margin-left:auto;text-align:right;">
          <div style="font-size:11px;opacity:.8;">পিতা</div>
          <div style="font-size:13px;font-weight:700;" id="pFather">-</div>
          <div style="font-size:11px;opacity:.7;margin-top:4px;" id="pBlood">-</div>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('attendance',this)">📅 উপস্থিতি</button>
      <button class="tab" onclick="switchTab('results',this)">📊 ফলাফল</button>
      <button class="tab" onclick="switchTab('fees',this)">💳 ফী ও বকেয়া</button>
      <button class="tab" onclick="switchTab('payment',this)">💰 পেমেন্ট করুন</button>
    </div>

    <!-- Tab: Attendance -->
    <div id="tab-attendance" class="tab-content">
      <div class="card">
        <div class="card-title">📅 উপস্থিতির সারসংক্ষেপ</div>
        <div class="stat-grid" id="attStats"></div>
        <div style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
            <span>উপস্থিতির হার</span><span id="attPct" style="font-weight:700;color:var(--primary);">-</span>
          </div>
          <div class="chart-bar"><div class="chart-bar-fill" id="attBar" style="width:0%"></div></div>
        </div>
        <div id="attMonthly"></div>
      </div>
    </div>

    <!-- Tab: Results -->
    <div id="tab-results" class="tab-content" style="display:none;">
      <div class="card">
        <div class="card-title">📊 পরীক্ষার ফলাফল</div>
        <div id="resultsBody"></div>
      </div>
    </div>

    <!-- Tab: Fees -->
    <div id="tab-fees" class="tab-content" style="display:none;">
      <div class="card">
        <div class="card-title">💳 ফী হিসাব</div>
        <div class="stat-grid" id="feeStats"></div>
        <div id="feeHistory"></div>
      </div>
    </div>

    <!-- Tab: Payment -->
    <div id="tab-payment" class="tab-content" style="display:none;">
      <div class="card">
        <div class="card-title">💰 অনলাইন পেমেন্ট</div>
        <div id="paymentBody"></div>
      </div>
    </div>

  </div><!-- /studentProfile -->

</div><!-- /container -->

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDCmruLhlbuieXhY8o7GqmIbjmWfWXXlLI",
  authDomain: "an-nazah-madrasa.firebaseapp.com",
  projectId: "an-nazah-madrasa",
  storageBucket: "an-nazah-madrasa.firebasestorage.app",
  messagingSenderId: "818805988468",
  appId: "1:818805988468:web:45952e528102b3aceb4521"
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var gData = { settings:{}, students:[], attendance:{}, results:[], feePayments:[], onlinePayments:[] };
var gStudent = null;
var PAYMENT_METHODS = { bkash:'bKash', nagad:'নগদ', bank:'ব্যাংক ট্রান্সফার' };
var PAYMENT_NUMBERS = { bkash:'01XXXXXXXXX', nagad:'01XXXXXXXXX', bank:'AC: XXXXXXXXXXXX' };

async function loadAllData() {
  var keys = ['settings','students','attendance','results','feePayments','onlinePayments'];
  for(var i=0;i<keys.length;i++){
    try {
      var doc = await db.collection('madrasa').doc(keys[i]).get();
      if(doc.exists) gData[keys[i]] = doc.data().value || (keys[i]==='settings'||keys[i]==='attendance' ? {} : []);
    } catch(e){}
  }
  var s = gData.settings;
  document.getElementById('instNameTop').textContent = s.name||'মাদ্রাসা';
  document.getElementById('instSubTop').textContent = (s.sub||'') + ' — অভিভাবক পোর্টাল';
  // Update payment numbers from settings
  if(s.bkashNumber) PAYMENT_NUMBERS.bkash = s.bkashNumber;
  if(s.nagadNumber) PAYMENT_NUMBERS.nagad = s.nagadNumber;
  if(s.bankAccount) PAYMENT_NUMBERS.bank = s.bankAccount;
}

function searchStudent() {
  var code = document.getElementById('searchInput').value.trim().toUpperCase();
  var errEl = document.getElementById('searchError');
  if(!code){ errEl.style.display='block'; errEl.textContent='কোড লিখুন।'; return; }
  errEl.style.display='none';
  document.getElementById('loader').style.display='block';
  document.getElementById('studentProfile').style.display='none';
  // slight delay for UX
  setTimeout(function(){
    var s = gData.students.find(function(x){ return (x.code||'').toUpperCase()===code; });
    document.getElementById('loader').style.display='none';
    if(!s){ errEl.style.display='block'; errEl.textContent='❌ এই কোডে কোনো শিক্ষার্থী পাওয়া যায়নি।'; return; }
    gStudent = s;
    showStudentProfile(s);
  }, 400);
}

function showStudentProfile(s) {
  document.getElementById('studentProfile').style.display='block';
  // Banner
  document.getElementById('pName').textContent = s.name;
  document.getElementById('pClass').textContent = 'শ্রেণি: '+(s.cls||'-')+' | রোল: '+(s.roll||'-')+(s.branch&&s.branch!=='সাধারণ'?' | শাখা: '+s.branch:'');
  document.getElementById('pCode').textContent = 'কোড: '+(s.code||'-');
  document.getElementById('pFather').textContent = s.father||'-';
  document.getElementById('pBlood').textContent = s.blood ? '🩸 '+s.blood : '';
  var photoArea = document.getElementById('sPhotoArea');
  photoArea.innerHTML = s.photo ? '<img src="'+s.photo+'" style="width:100%;height:100%;object-fit:cover;">' : (s.gender==='মহিলা'?'👩':'👦');
  // Default tab
  switchTab('attendance', document.querySelector('.tab'));
  renderAttendance(s);
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(function(el){ el.style.display='none'; });
  document.querySelectorAll('.tab').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('tab-'+tab).style.display='block';
  if(btn) btn.classList.add('active');
  if(tab==='results') renderResults(gStudent);
  if(tab==='fees') renderFees(gStudent);
  if(tab==='payment') renderPaymentForm(gStudent);
}

function renderAttendance(s) {
  var attDays = Object.entries(gData.attendance).filter(function(e){ return e[0].startsWith(s.cls+'_'); });
  attDays.sort(function(a,b){ return a[0].localeCompare(b[0]); });
  var present = attDays.filter(function(e){ return e[1][s.id]==='উপস্থিত'; }).length;
  var total = attDays.length;
  var absent = total - present;
  var pct = total>0?Math.round(present/total*100):0;
  var color = pct>=75?'#155724':pct>=60?'#856404':'#721c24';

  document.getElementById('attStats').innerHTML =
    '<div class="stat-box"><div class="n">'+total+'</div><div class="l">মোট দিন</div></div>'+
    '<div class="stat-box" style="background:var(--primary);"><div class="n">'+present+'</div><div class="l">উপস্থিত</div></div>'+
    '<div class="stat-box danger"><div class="n">'+absent+'</div><div class="l">অনুপস্থিত</div></div>'+
    '<div class="stat-box accent"><div class="n">'+pct+'%</div><div class="l">হাজিরা হার</div></div>';
  document.getElementById('attPct').textContent = pct+'%';
  document.getElementById('attPct').style.color = color;
  document.getElementById('attBar').style.width = pct+'%';
  document.getElementById('attBar').style.background = pct>=75?'var(--primary)':pct>=60?'var(--accent)':'var(--danger)';

  // Monthly breakdown
  var byMonth = {};
  attDays.forEach(function(e){
    var parts=e[0].split('_'); var dateStr=parts[1]||''; var m=dateStr.substring(0,7);
    if(!byMonth[m]) byMonth[m]={p:0,t:0};
    byMonth[m].t++;
    if(e[1][s.id]==='উপস্থিত') byMonth[m].p++;
  });
  var monthNames = {'01':'জানু','02':'ফেব্রু','03':'মার্চ','04':'এপ্রিল','05':'মে','06':'জুন','07':'জুলাই','08':'আগস্ট','09':'সেপ্টে','10':'অক্টো','11':'নভে','12':'ডিসে'};
  var mHtml = Object.keys(byMonth).sort().reverse().map(function(mk){
    var mn=byMonth[mk]; var mp=mn.t>0?Math.round(mn.p/mn.t*100):0;
    var parts=mk.split('-'); var label=(monthNames[parts[1]]||parts[1])+' '+parts[0];
    return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px;">'+
      '<div style="width:70px;color:#555;">'+label+'</div>'+
      '<div style="flex:1;"><div class="chart-bar"><div class="chart-bar-fill" style="width:'+mp+'%;background:'+(mp>=75?'var(--primary)':mp>=60?'var(--accent)':'var(--danger)')+'"></div></div></div>'+
      '<div style="width:60px;text-align:right;font-weight:700;color:'+(mp>=75?'var(--primary)':mp>=60?'#856404':'var(--danger)')+'">'+mn.p+'/'+mn.t+' ('+mp+'%)</div>'+
      '</div>';
  }).join('');
  document.getElementById('attMonthly').innerHTML = mHtml||'<p style="color:#888;text-align:center;padding:10px;">উপস্থিতির তথ্য নেই।</p>';
}

function renderResults(s) {
  var results = (gData.results||[]).filter(function(r){ return r.studentId===s.id; });
  if(!results.length){ document.getElementById('resultsBody').innerHTML='<p style="text-align:center;color:#888;padding:20px;">কোনো ফলাফল নেই।</p>'; return; }
  var exams = {};
  results.forEach(function(r){ var k=r.examName||'পরীক্ষা'; if(!exams[k]) exams[k]=[]; exams[k].push(r); });
  var html = Object.keys(exams).map(function(examName){
    var rows = exams[examName];
    var total = rows.reduce(function(a,r){return a+Number(r.marks||0);},0);
    var full = rows.reduce(function(a,r){return a+Number(r.fullMarks||100);},0);
    var pct = full>0?Math.round(total/full*100):0;
    var grade = pct>=80?'A+':pct>=70?'A':pct>=60?'A-':pct>=50?'B':pct>=40?'C':'F';
    var gpa = pct>=80?5.0:pct>=70?4.0:pct>=60?3.5:pct>=50?3.0:pct>=40?2.0:0;
    return '<div class="result-exam">'+
      '<span>'+examName+'</span>'+
      '<span>মোট: '+total+'/'+full+' | '+grade+' (GPA '+gpa+')</span>'+
      '</div>'+
      '<div class="result-table-wrap">'+
        '<table><thead><tr><th>বিষয়</th><th>পূর্ণমান</th><th>প্রাপ্তমান</th><th>গ্রেড</th></tr></thead><tbody>'+
        rows.map(function(r){
          var m=Number(r.marks||0),f=Number(r.fullMarks||100),p=f>0?Math.round(m/f*100):0;
          var g=p>=80?'A+':p>=70?'A':p>=60?'A-':p>=50?'B':p>=40?'C':'F';
          return '<tr><td><b>'+(r.subject||'-')+'</b></td><td style="text-align:center;">'+f+'</td>'+
            '<td style="text-align:center;font-weight:700;color:'+(p>=70?'#155724':p>=40?'#856404':'#721c24')+';">'+m+'</td>'+
            '<td style="text-align:center;"><span class="badge '+(p>=70?'badge-green':p>=40?'badge-yellow':'badge-red')+'">'+g+'</span></td></tr>';
        }).join('')+
        '</tbody></table></div>';
  }).join('');
  document.getElementById('resultsBody').innerHTML = html;
}

function renderFees(s) {
  var paid = (gData.feePayments||[]).filter(function(f){ return f.personId===s.id; });
  var totalPaid = paid.reduce(function(a,b){return a+Number(b.amount);},0);
  var monthlyFee = Number(s.fee||0);
  // rough due: months since admission * fee - paid
  var admDate = s.admDate ? new Date(s.admDate) : new Date();
  var now = new Date();
  var months = Math.max(0, (now.getFullYear()-admDate.getFullYear())*12 + (now.getMonth()-admDate.getMonth()));
  var totalExpected = months * monthlyFee;
  var due = Math.max(0, totalExpected - totalPaid);

  document.getElementById('feeStats').innerHTML =
    '<div class="stat-box"><div class="n">৳'+monthlyFee+'</div><div class="l">মাসিক ফী</div></div>'+
    '<div class="stat-box" style="background:var(--primary);"><div class="n">৳'+totalPaid.toLocaleString()+'</div><div class="l">মোট আদায়</div></div>'+
    '<div class="stat-box danger"><div class="n">৳'+due.toLocaleString()+'</div><div class="l">বকেয়া</div></div>'+
    '<div class="stat-box accent"><div class="n">'+months+'</div><div class="l">মাস</div></div>';

  var rows = paid.slice().reverse().slice(0,10).map(function(p){
    return '<tr><td>'+( p.date||'-')+'</td><td>'+( p.feeType||'-')+'</td>'+
      '<td style="font-weight:700;color:var(--primary);">৳'+Number(p.amount).toLocaleString()+'</td>'+
      '<td><span style="background:#d4edda;color:#155724;padding:1px 8px;border-radius:10px;font-size:11px;">✅ আদায়</span></td></tr>';
  }).join('')||'<tr><td colspan="4" style="text-align:center;color:#888;padding:12px;">কোনো রেকর্ড নেই</td></tr>';

  // Online pending payments
  var pending = (gData.onlinePayments||[]).filter(function(p){ return p.studentId===s.id && p.status==='pending'; });
  var pendingHTML = pending.length ? pending.map(function(p){
    return '<div class="pending-box" style="margin-bottom:8px;">'+
      '<div style="font-size:13px;font-weight:700;color:#856404;">⏳ পেমেন্ট যাচাই প্রক্রিয়াধীন</div>'+
      '<div style="font-size:12px;margin-top:4px;">পরিমাণ: <b>৳'+Number(p.amount).toLocaleString()+'</b> | পদ্ধতি: <b>'+p.method+'</b> | ট্রান্সেকশন: <b>'+(p.txId||'-')+'</b></div>'+
      '<div style="font-size:11px;color:#856404;margin-top:2px;">জমা দেওয়ার তারিখ: '+(p.date||'-')+'</div>'+
      '</div>';
  }).join('') : '';
  var confirmed = (gData.onlinePayments||[]).filter(function(p){ return p.studentId===s.id && p.status==='confirmed'; });
  var confirmedHTML = confirmed.slice(-2).map(function(p){
    return '<div class="confirmed-box" style="margin-bottom:8px;">'+
      '<div style="font-size:13px;font-weight:700;color:#155724;">✅ পেমেন্ট নিশ্চিত হয়েছে</div>'+
      '<div style="font-size:12px;margin-top:4px;">৳'+Number(p.amount).toLocaleString()+' | '+p.method+' | তারিখ: '+(p.confirmedDate||'-')+'</div></div>';
  }).join('');

  document.getElementById('feeHistory').innerHTML =
    pendingHTML + confirmedHTML +
    '<div style="font-weight:700;font-size:13px;margin:12px 0 8px;">📋 পেমেন্ট ইতিহাস</div>'+
    '<div style="overflow-x:auto;"><table><thead><tr><th>তারিখ</th><th>ধরন</th><th>পরিমাণ</th><th>স্ট্যাটাস</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

var selectedMethod = 'bkash';
function selectMethod(m) {
  selectedMethod = m;
  document.querySelectorAll('.method-btn').forEach(function(b){ b.classList.remove('active'); });
  var btn = document.getElementById('mBtn-'+m);
  if(btn) btn.classList.add('active');
  var details = document.getElementById('methodDetails');
  var s = gData.settings;
  var nums = {
    bkash: s.bkashNumber||'সেটিংসে bKash নম্বর দিন',
    nagad: s.nagadNumber||'সেটিংসে নগদ নম্বর দিন',
    bank: s.bankAccount||'সেটিংসে ব্যাংক একাউন্ট দিন'
  };
  var labels = { bkash:'📱 bKash নম্বরে Send Money করুন:', nagad:'📱 নগদ নম্বরে Send Money করুন:', bank:'🏦 ব্যাংক একাউন্টে ট্রান্সফার করুন:' };
  if(details) details.innerHTML = '<div style="font-weight:700;margin-bottom:4px;color:var(--primary-dark);">'+labels[m]+'</div>'+
    '<div style="font-size:18px;font-weight:800;letter-spacing:2px;color:var(--danger);">'+nums[m]+'</div>'+
    '<div style="font-size:11px;color:#888;margin-top:4px;">পেমেন্ট করার পরে নিচে ট্রান্সেকশন আইডি দিন।</div>';
}

function calcDue(s) {
  var paid = (gData.feePayments||[]).filter(function(f){ return f.personId===s.id; });
  var totalPaid = paid.reduce(function(a,b){return a+Number(b.amount);},0);
  var monthlyFee = Number(s.fee||0);
  var admDate = s.admDate ? new Date(s.admDate) : new Date();
  var now = new Date();
  var months = Math.max(0,(now.getFullYear()-admDate.getFullYear())*12+(now.getMonth()-admDate.getMonth()));
  return Math.max(0, months*monthlyFee - totalPaid);
}

async function submitPayment() {
  var amount = document.getElementById('payAmount').value;
  var txId = document.getElementById('payTxId').value.trim();
  var feeType = document.getElementById('payFeeType').value;
  if(!amount||Number(amount)<=0){ alert('সঠিক পরিমাণ দিন।'); return; }
  if(!txId){ alert('ট্রান্সেকশন আইডি দিন।'); return; }
  var payment = {
    id: 'PAY-'+Date.now(),
    studentId: gStudent.id,
    studentCode: gStudent.code||'',
    studentName: gStudent.name,
    amount: Number(amount),
    method: selectedMethod==='bkash'?'bKash':selectedMethod==='nagad'?'নগদ':'ব্যাংক',
    txId: txId,
    feeType: feeType,
    date: new Date().toISOString().split('T')[0],
    status: 'pending'
  };
  if(!gData.onlinePayments) gData.onlinePayments=[];
  gData.onlinePayments.push(payment);
  try {
    await db.collection('madrasa').doc('onlinePayments').set({value: gData.onlinePayments});
    document.getElementById('paymentBody').innerHTML =
      '<div class="pending-box" style="padding:24px;text-align:center;">'+
        '<div style="font-size:40px;margin-bottom:10px;">⏳</div>'+
        '<div style="font-size:16px;font-weight:800;color:#856404;margin-bottom:6px;">পেমেন্ট জমা হয়েছে!</div>'+
        '<div style="font-size:13px;">পরিমাণ: <b>৳'+Number(amount).toLocaleString()+'</b></div>'+
        '<div style="font-size:13px;">ট্রান্সেকশন: <b>'+txId+'</b></div>'+
        '<div style="font-size:12px;color:#856404;margin-top:10px;">মাদ্রাসা কর্তৃপক্ষ যাচাই করার পরে আপনাকে সবুজ সংকেত দেখানো হবে।</div>'+
        '<button class="btn btn-primary" style="margin-top:14px;" onclick="refreshPaymentStatus()">🔄 স্ট্যাটাস চেক করুন</button>'+
      '</div>';
  } catch(e) {
    alert('সংযোগ সমস্যা! আবার চেষ্টা করুন।');
  }
}

async function refreshPaymentStatus() {
  try {
    var doc = await db.collection('madrasa').doc('onlinePayments').get();
    if(doc.exists) gData.onlinePayments = doc.data().value||[];
    renderFees(gStudent);
    switchTab('fees', null);
    document.querySelectorAll('.tab')[2].classList.add('active');
  } catch(e){}
}

// Auto-load from URL param
window.addEventListener('load', async function(){
  document.getElementById('loader').style.display='block';
  await loadAllData();
  document.getElementById('loader').style.display='none';
  // Check URL param
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  if(code){
    document.getElementById('searchInput').value = code;
    searchStudent();
  }
});
</script>
